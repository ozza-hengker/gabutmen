<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ozza's Global Karaoke 🎤</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            /* Efek background ala room karaoke */
            background-image: radial-gradient(circle at 50% 0%, #3b0764 0%, #0f172a 70%);
            min-height: 100vh;
        }
        
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .neon-text {
            text-shadow: 0 0 10px rgba(168, 85, 247, 0.8), 0 0 20px rgba(168, 85, 247, 0.4);
        }

        .lyrics-box {
            scrollbar-width: thin;
            scrollbar-color: #a855f7 #1e293b;
        }
        
        .lyrics-box::-webkit-scrollbar {
            width: 8px;
        }
        
        .lyrics-box::-webkit-scrollbar-track {
            background: #1e293b;
            border-radius: 4px;
        }
        
        .lyrics-box::-webkit-scrollbar-thumb {
            background-color: #a855f7;
            border-radius: 4px;
        }

        /* Animasi piringan hitam (album art) */
        .spin {
            animation: spin 4s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Efek Lirik Aktif */
        .lyric-line {
            transition: all 0.3s ease;
        }
        .lyric-active {
            color: #e879f9; /* Pink neon terang */
            font-size: 1.25em;
            font-weight: bold;
            text-shadow: 0 0 15px rgba(232, 121, 249, 0.6);
            transform: scale(1.05);
        }
    </style>
</head>
<body class="flex flex-col items-center pb-12">

    <!-- Header -->
    <header class="w-full text-center py-8 px-4">
        <h1 class="text-4xl md:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-600 neon-text mb-2">
            <i class="fas fa-microphone-alt mr-2 text-purple-400"></i> Ozza's Karaoke Club
        </h1>
        <p class="text-gray-400 text-sm md:text-base">Live dari Malang ke Seluruh Dunia 🌍</p>
    </header>

    <!-- Halaman Pencarian -->
    <main id="search-page" class="w-full max-w-5xl px-4 flex flex-col items-center transition-all duration-500">
        <!-- Search Bar -->
        <div class="w-full max-w-2xl flex gap-2 mb-10">
            <input type="text" id="search-input" placeholder="Ketik nama lagu atau penyanyi..." 
                class="w-full bg-slate-800 border border-slate-700 text-white px-6 py-4 rounded-full focus:outline-none focus:border-purple-500 focus:ring-2 focus:ring-purple-500/50 text-lg shadow-lg">
            <button onclick="searchSongs()" id="search-btn" class="bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-500 hover:to-pink-500 text-white px-8 py-4 rounded-full font-bold transition-all shadow-lg hover:shadow-purple-500/50 flex items-center justify-center">
                <i class="fas fa-search"></i>
            </button>
        </div>

        <!-- Loading Indicator -->
        <div id="loading" class="hidden flex-col items-center my-8">
            <i class="fas fa-circle-notch fa-spin text-4xl text-purple-500 mb-4"></i>
            <p class="text-purple-300">Mencari lagu di database global...</p>
        </div>

        <!-- Hasil Pencarian -->
        <div id="results-grid" class="w-full grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Card hasil pencarian akan muncul di sini -->
        </div>
        
        <div id="empty-state" class="text-center mt-12 text-gray-500">
            <i class="fas fa-music text-6xl mb-4 opacity-20"></i>
            <p>Cari lagu kesukaanmu untuk mulai bernyanyi!</p>
        </div>
    </main>

    <!-- Halaman Karaoke (Player & Lirik) -->
    <main id="karaoke-page" class="w-full max-w-4xl px-4 hidden flex-col items-center transition-all duration-500">
        <button onclick="closeKaraoke()" class="self-start mb-6 text-purple-400 hover:text-purple-300 flex items-center gap-2 transition-colors">
            <i class="fas fa-arrow-left"></i> Kembali ke Pencarian
        </button>

        <div class="glass-panel w-full rounded-3xl p-6 md:p-10 flex flex-col items-center shadow-2xl">
            <!-- Album Art & Info -->
            <div class="flex flex-col md:flex-row items-center gap-8 w-full mb-8">
                <div class="relative w-48 h-48 md:w-56 md:h-56 shrink-0 rounded-full border-4 border-purple-500/30 overflow-hidden shadow-[0_0_30px_rgba(168,85,247,0.4)]">
                    <img id="k-artwork" src="" alt="Album Art" class="w-full h-full object-cover">
                    <!-- Titik tengah piringan hitam -->
                    <div class="absolute inset-0 m-auto w-8 h-8 bg-slate-900 rounded-full border-2 border-slate-700"></div>
                </div>
                
                <div class="text-center md:text-left flex-1">
                    <h2 id="k-title" class="text-3xl md:text-4xl font-bold text-white mb-2">Judul Lagu</h2>
                    <p id="k-artist" class="text-xl text-purple-300 mb-6">Nama Artis</p>
                    
                    <!-- Audio Player -->
                    <div class="w-full bg-slate-800/50 rounded-full p-2 border border-slate-700 backdrop-blur-sm">
                        <audio id="audio-player" controls class="w-full h-10 outline-none">
                            <source id="audio-source" src="" type="audio/mpeg">
                            Browser kamu tidak mendukung elemen audio.
                        </audio>
                    </div>
                    <p class="text-xs text-gray-400 mt-2"><i class="fas fa-info-circle"></i> Memutar preview audio 30 detik dari iTunes.</p>
                </div>
            </div>

            <!-- Mic Sync Control -->
            <div class="w-full flex justify-center mb-6 border-b border-slate-700/50 pb-6">
                <button id="mic-btn" onclick="toggleMic()" class="bg-slate-700 hover:bg-purple-600 text-white px-6 py-3 rounded-full font-semibold transition-all flex items-center gap-3 shadow-lg">
                    <i class="fas fa-microphone-slash" id="mic-icon"></i> 
                    <span id="mic-text">Aktifkan Mic (Sync Lirik & Efek Suara)</span>
                </button>
            </div>

            <!-- Lirik Section -->
            <div class="w-full mt-4">
                <div class="flex justify-between items-center mb-4 border-b border-slate-700/50 pb-2">
                    <h3 class="text-xl font-semibold text-white flex items-center gap-2">
                        <i class="fas fa-align-left text-pink-500"></i> Lirik Lagu
                    </h3>
                    <div id="lyrics-loading" class="text-sm text-pink-400 hidden items-center gap-2">
                        <i class="fas fa-spinner fa-spin"></i> AI sedang menulis lirik...
                    </div>
                </div>
                
                <div id="lyrics-container" class="lyrics-box w-full h-[400px] overflow-y-auto bg-slate-900/60 rounded-2xl p-6 text-center text-lg md:text-2xl leading-relaxed font-medium text-gray-200 shadow-inner">
                    <!-- Lirik akan dimuat di sini -->
                </div>
            </div>
        </div>
    </main>

    <script>
        // API Configuration (Gemini API untuk Lirik)
        const apiKey = ""; // Kunci API akan disuntikkan secara otomatis oleh environment

        // DOM Elements
        const searchInput = document.getElementById('search-input');
        const resultsGrid = document.getElementById('results-grid');
        const loadingIndicator = document.getElementById('loading');
        const emptyState = document.getElementById('empty-state');
        
        const searchPage = document.getElementById('search-page');
        const karaokePage = document.getElementById('karaoke-page');
        
        const audioPlayer = document.getElementById('audio-player');
        const kArtwork = document.getElementById('k-artwork');
        const kTitle = document.getElementById('k-title');
        const kArtist = document.getElementById('k-artist');
        const lyricsContainer = document.getElementById('lyrics-container');
        const lyricsLoading = document.getElementById('lyrics-loading');

        // Variables for Mic Sync & Visualizer
        let isMicActive = false;
        let recognition = null;
        let audioContext = null;
        let mediaStream = null;
        let currentLyricsArray = [];

        // Event Listener untuk tombol Enter di pencarian
        searchInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                searchSongs();
            }
        });

        // Kontrol Animasi Putar Cover Album
        audioPlayer.addEventListener('play', () => kArtwork.classList.add('spin'));
        audioPlayer.addEventListener('pause', () => kArtwork.classList.remove('spin'));
        audioPlayer.addEventListener('ended', () => kArtwork.classList.remove('spin'));

        // Fungsi Utama Pencarian (Menggunakan iTunes Search API)
        async function searchSongs() {
            const query = searchInput.value.trim();
            if (!query) return;

            // Update UI
            resultsGrid.innerHTML = '';
            emptyState.classList.add('hidden');
            loadingIndicator.classList.remove('hidden');
            loadingIndicator.classList.add('flex');

            try {
                // Fetch dari iTunes API (Cepat & Mendukung CORS)
                const response = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&media=music&entity=song&limit=15`);
                const data = await response.json();

                loadingIndicator.classList.add('hidden');
                loadingIndicator.classList.remove('flex');

                if (data.results.length === 0) {
                    emptyState.classList.remove('hidden');
                    emptyState.innerHTML = '<i class="fas fa-search-minus text-6xl mb-4 text-gray-600"></i><p>Yah, lagunya gak ketemu. Coba kata kunci lain, Ozza!</p>';
                    return;
                }

                // Render Hasil
                data.results.forEach(song => {
                    // Dapatkan gambar dengan resolusi lebih baik (600x600)
                    const highResImage = song.artworkUrl100.replace('100x100bb', '600x600bb');
                    
                    const card = document.createElement('div');
                    card.className = 'glass-panel rounded-2xl p-4 flex items-center gap-4 hover:bg-slate-800 transition-all cursor-pointer group hover:-translate-y-1';
                    
                    // Hindari tanda kutip ganda rusak dengan escape karakter untuk onclick
                    const safeTitle = song.trackName.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                    const safeArtist = song.artistName.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                    
                    card.onclick = () => openKaraoke(safeTitle, safeArtist, song.previewUrl, highResImage);

                    card.innerHTML = `
                        <div class="relative w-20 h-20 rounded-xl overflow-hidden shrink-0">
                            <img src="${song.artworkUrl100}" alt="${song.trackName}" class="w-full h-full object-cover">
                            <div class="absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                                <i class="fas fa-play text-white text-xl"></i>
                            </div>
                        </div>
                        <div class="flex-1 min-w-0">
                            <h3 class="text-white font-bold truncate text-lg">${song.trackName}</h3>
                            <p class="text-purple-400 text-sm truncate">${song.artistName}</p>
                        </div>
                    `;
                    resultsGrid.appendChild(card);
                });

            } catch (error) {
                console.error("Error fetching songs:", error);
                loadingIndicator.classList.add('hidden');
                loadingIndicator.classList.remove('flex');
                emptyState.classList.remove('hidden');
                emptyState.innerHTML = '<i class="fas fa-exclamation-triangle text-6xl mb-4 text-red-500"></i><p>Aduh, koneksi terganggu. Coba lagi ya!</p>';
            }
        }

        // Buka Halaman Karaoke
        function openKaraoke(title, artist, previewUrl, artworkUrl) {
            // Sembunyikan pencarian, tampilkan karaoke
            searchPage.classList.add('hidden');
            karaokePage.classList.remove('hidden');
            karaokePage.classList.add('flex');

            // Matikan mic jika sebelumnya nyala (reset state)
            if (isMicActive) toggleMic();

            // Set Data
            kTitle.textContent = title;
            kArtist.textContent = artist;
            kArtwork.src = artworkUrl;
            
            // Set Audio
            audioPlayer.src = previewUrl;
            audioPlayer.load();
            
            // Reset Lirik
            lyricsContainer.innerHTML = '';
            kArtwork.classList.remove('spin');
            
            // Otomatis mainkan lagu
            audioPlayer.play().catch(e => console.log("Autoplay ditahan browser, butuh interaksi user."));

            // Ambil Lirik menggunakan Gemini AI
            fetchLyricsWithAI(artist, title);
        }

        // Tutup Halaman Karaoke
        function closeKaraoke() {
            audioPlayer.pause();
            audioPlayer.src = "";
            kArtwork.classList.remove('spin');
            
            if (isMicActive) toggleMic(); // Matikan mic dan API saat keluar

            karaokePage.classList.add('hidden');
            karaokePage.classList.remove('flex');
            searchPage.classList.remove('hidden');
        }

        // Fungsi Mengambil Lirik dengan Gemini AI (Implementasi Endpoint yang Benar)
        async function fetchLyricsWithAI(artist, title) {
            lyricsLoading.classList.remove('hidden');
            lyricsLoading.classList.add('flex');
            lyricsContainer.innerHTML = '<p class="text-gray-500 italic mt-20">Sedang menyusun lirik...</p>';

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const prompt = `Berikan lirik lagu lengkap untuk lagu berjudul "${title}" yang dinyanyikan oleh "${artist}". 
                           Hanya berikan teks liriknya saja. Jangan tambahkan intro, outro, atau teks percakapan apapun.
                           Jika kamu benar-benar tidak tahu liriknya, balas dengan "Maaf, lirik tidak ditemukan."`;

            // Implementasi Exponential Backoff untuk keandalan API
            const maxRetries = 3;
            let delay = 1000;

            for (let i = 0; i < maxRetries; i++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            contents: [{
                                parts: [{ text: prompt }]
                            }]
                        })
                    });

                    if (!response.ok) throw new Error('API Request Failed');

                    const data = await response.json();
                let lyricsText = data.candidates?.[0]?.content?.parts?.[0]?.text;

                if (lyricsText) {
                    // Simpan lirik baris per baris ke dalam array untuk proses Sinkronisasi Mic
                    currentLyricsArray = lyricsText.split('\n').filter(line => line.trim() !== '');
                    
                    let formattedLyrics = '';
                    currentLyricsArray.forEach((line, index) => {
                        formattedLyrics += `<div id="lyric-${index}" class="lyric-line py-2 text-gray-400 hover:text-white cursor-pointer" onclick="manualSync(${index})">${line}</div>`;
                    });
                    
                    lyricsContainer.innerHTML = formattedLyrics;
                } else {
                    lyricsContainer.innerHTML = '<p class="text-red-400 mt-20"><i class="fas fa-frown"></i> Maaf Ozza, lirik tidak ditemukan.</p>';
                }
                
                lyricsLoading.classList.add('hidden');
                    lyricsLoading.classList.remove('flex');
                    return; // Berhasil, keluar dari loop

                } catch (error) {
                    console.error(`Attempt ${i + 1} failed:`, error);
                    if (i === maxRetries - 1) {
                        lyricsContainer.innerHTML = '<p class="text-red-400 mt-20"><i class="fas fa-exclamation-circle"></i> Gagal mengambil lirik dari server. Coba nyanyi dari memori aja ya!</p>';
                        lyricsLoading.classList.add('hidden');
                        lyricsLoading.classList.remove('flex');
                    } else {
                        await new Promise(res => setTimeout(res, delay));
                    delay *= 2; // Exponential backoff
                }
            }
        }

        // ==========================================
        // FITUR IMMERSIVE: Mic, Visualizer & AI Sync
        // ==========================================
        async function toggleMic() {
            const micBtn = document.getElementById('mic-btn');
            const micIcon = document.getElementById('mic-icon');
            const micText = document.getElementById('mic-text');

            if (isMicActive) {
                // Matikan Mic & Sync
                isMicActive = false;
                micBtn.classList.replace('bg-purple-600', 'bg-slate-700');
                micIcon.classList.replace('fa-microphone', 'fa-microphone-slash');
                micText.textContent = 'Aktifkan Mic (Sync Lirik & Efek Suara)';
                kArtwork.style.boxShadow = '0 0 30px rgba(168,85,247,0.4)'; // Reset glow cover album

                if (recognition) recognition.stop();
                if (mediaStream) mediaStream.getTracks().forEach(track => track.stop());
                if (audioContext) audioContext.close();
                return;
            }

            try {
                // Meminta izin ke browser (kamu harus klik Allow/Izinkan)
                mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                
                isMicActive = true;
                micBtn.classList.replace('bg-slate-700', 'bg-purple-600');
                micIcon.classList.replace('fa-microphone-slash', 'fa-microphone');
                micText.textContent = 'Mic Aktif (Bernyanyilah!)';

                // 1. Setup Audio Visualizer (Cover album berdenyut sesuai suaramu)
                setupVisualizer(mediaStream);

                // 2. Setup AI Speech Recognition (Dengar & Sync Lirik otomatis)
                setupSpeechRecognition();

            } catch (err) {
                console.error("Mic error:", err);
                alert("Gagal mengakses Mikrofon. Pastikan kamu memberi izin ya, Ozza!");
            }
        }

        function setupVisualizer(stream) {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const analyser = audioContext.createAnalyser();
            const microphone = audioContext.createMediaStreamSource(stream);
            const javascriptNode = audioContext.createScriptProcessor(2048, 1, 1);

            analyser.smoothingTimeConstant = 0.8;
            analyser.fftSize = 1024;

            microphone.connect(analyser);
            analyser.connect(javascriptNode);
            javascriptNode.connect(audioContext.destination);

            javascriptNode.onaudioprocess = function() {
                if (!isMicActive) return;
                const array = new Uint8Array(analyser.frequencyBinCount);
                analyser.getByteFrequencyData(array);
                
                let values = 0;
                for (let i = 0; i < array.length; i++) {
                    values += (array[i]);
                }
                const average = values / array.length;
                
                // Efek Neon: Besarnya cahaya piringan hitam bergantung pada kerasnya suaramu!
                const glowBase = 30 + (average * 2);
                kArtwork.style.boxShadow = `0 0 ${glowBase}px rgba(168,85,247, ${0.4 + (average/200)})`;
            };
        }

        function setupSpeechRecognition() {
            if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                console.warn("Browser tidak mendukung Speech Recognition API.");
                return;
            }

            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            
            recognition.continuous = true;
            recognition.interimResults = true;

            recognition.onresult = (event) => {
                if (!isMicActive) return;
                let transcript = '';
                // Gabungkan kata-kata yang sedang kamu nyanyikan
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    transcript += event.results[i][0].transcript;
                }
                syncLyricByText(transcript);
            };

            recognition.onend = () => {
                // Restart otomatis jika lagu masih jalan (mencegah mic mati sendiri)
                if (isMicActive) {
                    try { recognition.start(); } catch(e){}
                }
            };

            recognition.start();
        }

        function syncLyricByText(spokenText) {
            if (!spokenText || currentLyricsArray.length === 0) return;
            
            const spokenWords = spokenText.toLowerCase().split(' ').filter(w => w.length > 2);
            if (spokenWords.length === 0) return;

            let bestIdx = -1;
            let maxScore = 0;

            // Logika AI: Mencari baris lirik mana yang paling mirip dengan suara/nyanyianmu
            currentLyricsArray.forEach((line, index) => {
                const lineWords = line.toLowerCase().split(' ');
                let score = 0;
                spokenWords.forEach(sw => {
                    if (lineWords.includes(sw)) score++;
                });
                
                if (score > maxScore) {
                    maxScore = score;
                    bestIdx = index;
                }
            });

            // Jika ketemu cocok, panggil animasi scroll
            if (bestIdx !== -1 && maxScore > 0) {
                manualSync(bestIdx);
            }
        }

        // Fungsi animasi untuk scroll lirik otomatis
        function manualSync(index) {
            // Matikan efek terang di lirik sebelumnya
            document.querySelectorAll('.lyric-line').forEach(el => {
                el.classList.remove('lyric-active', 'text-white');
                el.classList.add('text-gray-400');
            });

            // Nyalakan efek neon di lirik yang sedang dinyanyikan
            const activeLine = document.getElementById(`lyric-${index}`);
            if (activeLine) {
                activeLine.classList.remove('text-gray-400');
                activeLine.classList.add('lyric-active', 'text-white');
                
                // Auto-scroll liriknya agar posisi lirik yang dinyanyikan selalu di tengah box!
                activeLine.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }
    </script>
</body>
</html>
