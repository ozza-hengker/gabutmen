<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ozza's Global Karaoke 🎤</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Load YouTube Iframe API -->
    <script src="https://www.youtube.com/iframe_api"></script>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            background-image: radial-gradient(circle at 50% 0%, #3b0764 0%, #0f172a 70%);
            min-height: 100vh;
        }
        
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .neon-text {
            text-shadow: 0 0 10px rgba(168, 85, 247, 0.8), 0 0 20px rgba(168, 85, 247, 0.4);
        }

        .lyrics-box {
            scrollbar-width: thin;
            scrollbar-color: #a855f7 transparent;
        }
        
        .lyrics-box::-webkit-scrollbar { width: 8px; }
        .lyrics-box::-webkit-scrollbar-track { background: transparent; }
        .lyrics-box::-webkit-scrollbar-thumb { background-color: #a855f7; border-radius: 4px; }

        /* Animasi piringan hitam */
        .spin { animation: spin 8s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Efek Lirik Aktif (Super Besar) */
        .lyric-line {
            transition: all 0.4s ease;
            opacity: 0.3;
            transform: scale(0.95);
        }
        .lyric-active {
            color: #ec4899; 
            opacity: 1;
            font-size: 1.4em;
            font-weight: 800;
            text-shadow: 0 0 25px rgba(236, 72, 153, 0.9);
            transform: scale(1.05);
        }

        .btn-spotify { background: linear-gradient(to right, #1DB954, #1ed760); }
    </style>
</head>
<body class="flex flex-col items-center pb-12 w-full min-h-screen relative overflow-x-hidden">

    <!-- Header -->
    <header class="w-full text-center py-8 px-4 z-10">
        <h1 class="text-4xl md:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-pink-500 to-purple-500 neon-text mb-2">
            <i class="fas fa-microphone-alt mr-2 text-pink-500"></i> Ozza's Karaoke Club
        </h1>
        <p class="text-gray-400 text-sm md:text-base mb-6">Live dari Malang ke Seluruh Dunia 🌍</p>
        
        <button id="spotify-login-btn" onclick="loginSpotify()" class="hidden mx-auto btn-spotify hover:scale-105 text-white px-6 py-2.5 rounded-full font-bold transition-transform shadow-[0_0_15px_rgba(29,185,84,0.4)] flex items-center justify-center gap-2">
            <i class="fab fa-spotify text-xl"></i> Sambungkan ke Spotify
        </button>
        <div id="spotify-user-info" class="hidden text-green-400 text-sm font-medium flex items-center justify-center gap-2">
            <i class="fab fa-spotify"></i> Terhubung dengan Spotify
        </div>
    </header>

    <!-- Halaman Utama (Pencarian & List Lagu) -->
    <main id="main-page" class="w-full max-w-4xl px-4 flex flex-col items-center z-10 transition-opacity duration-300">
        
        <!-- Search Bar -->
        <div class="w-full flex gap-2 mb-10">
            <input type="text" id="search-input" placeholder="Cari judul lagu atau nama artis..." 
                class="w-full bg-slate-800/80 border border-slate-700 text-white px-6 py-4 rounded-full focus:outline-none focus:border-pink-500 focus:ring-2 focus:ring-pink-500/50 text-lg shadow-lg">
            <button id="search-btn" class="bg-gradient-to-r from-pink-600 to-purple-600 hover:from-pink-500 hover:to-purple-500 text-white px-8 py-4 rounded-full font-bold transition-all shadow-lg shadow-pink-500/30 flex items-center justify-center cursor-pointer hover:scale-105">
                <i class="fas fa-search text-xl"></i>
            </button>
        </div>

        <!-- Loading Global -->
        <div id="main-loading" class="hidden justify-center my-8 w-full">
            <i class="fas fa-circle-notch fa-spin text-4xl text-pink-500"></i>
        </div>

        <!-- Section: Spotify Top Tracks -->
        <div id="spotify-section" class="w-full hidden flex-col mb-12">
            <h2 class="text-2xl font-bold text-white mb-4 flex items-center gap-2 border-b border-slate-700/50 pb-2">
                <i class="fas fa-history text-green-400"></i> Sering Kamu Putar di Spotify
            </h2>
            <div id="spotify-list" class="w-full flex flex-col gap-3"></div>
        </div>

        <!-- Section: Lagu Favorit (Firebase) -->
        <div id="favorites-section" class="w-full flex-col mb-12">
            <h2 class="text-2xl font-bold text-white mb-4 flex items-center gap-2 border-b border-slate-700/50 pb-2">
                <i class="fas fa-heart text-pink-500"></i> Lagu Favorit Kamu
            </h2>
            <div id="favorites-list" class="w-full flex flex-col gap-3"></div>
            <p id="empty-favorites" class="text-gray-500 text-sm mt-2 text-center py-6 glass-panel rounded-2xl">
                <i class="fas fa-music text-3xl mb-2 opacity-50 block"></i>
                Belum ada lagu favorit yang disimpan.
            </p>
        </div>

        <!-- Section: Hasil Pencarian -->
        <div id="search-results-section" class="w-full flex-col hidden mb-12">
            <div class="flex justify-between items-center mb-4 border-b border-slate-700/50 pb-2">
                <h2 class="text-2xl font-bold text-white flex items-center gap-2">
                    <i class="fas fa-search text-pink-400"></i> Hasil Pencarian
                </h2>
                <button onclick="clearSearch()" class="text-sm text-gray-400 hover:text-white"><i class="fas fa-times mr-1"></i>Tutup</button>
            </div>
            <div id="search-results-list" class="w-full flex flex-col gap-3"></div>
        </div>

    </main>

    <!-- ============================================== -->
    <!-- IMMERSIVE FULLSCREEN PLAYER (SLIDE UP)         -->
    <!-- ============================================== -->
    <div id="player-screen" class="fixed inset-0 w-full h-[100dvh] z-50 bg-[#0f172a] flex flex-col transform translate-y-full transition-transform duration-500 ease-in-out overflow-hidden">
        
        <!-- Blur Background Cover -->
        <div id="p-bg-blur" class="absolute inset-0 bg-cover bg-center opacity-40 blur-[60px] scale-110 pointer-events-none transition-all duration-1000"></div>
        <!-- Dark Gradient Overlay -->
        <div class="absolute inset-0 bg-gradient-to-b from-[#0f172a]/40 via-[#0f172a]/80 to-[#0f172a] pointer-events-none"></div>

        <!-- HIDDEN YOUTUBE ENGINE (Mesin Suara Instrumental) -->
        <div class="fixed top-0 left-[-1000px] w-[1px] h-[1px] opacity-0 pointer-events-none z-[-1]">
            <div id="hidden-yt-player"></div>
        </div>

        <!-- Player Top Bar -->
        <div class="relative z-10 flex items-center justify-between p-6 md:px-12 pt-8 w-full max-w-7xl mx-auto">
            <button onclick="closeKaraoke()" class="text-white w-12 h-12 flex items-center justify-center bg-white/10 rounded-full hover:bg-white/20 transition-colors backdrop-blur-md hover:scale-105 group">
                <i class="fas fa-chevron-down text-2xl group-hover:translate-y-1 transition-transform"></i>
            </button>
            <div class="flex-1 text-center px-6">
                <h2 id="p-title" class="text-white font-extrabold text-2xl md:text-3xl truncate drop-shadow-lg">Judul Lagu</h2>
                <p id="p-artist" class="text-pink-400 text-sm md:text-base font-semibold drop-shadow-md">Nama Artis</p>
            </div>
            <button id="p-fav-btn" onclick="toggleFavoriteCurrentSong()" class="text-white w-12 h-12 flex items-center justify-center bg-white/10 rounded-full hover:bg-white/20 transition-colors backdrop-blur-md hover:scale-105">
                <i id="p-fav-icon" class="far fa-heart text-2xl"></i>
            </button>
        </div>

        <!-- Center Content Area (Audio & Controls) -->
        <div class="relative z-10 flex flex-col items-center w-full max-w-4xl mx-auto px-6 md:px-12 mt-4 md:mt-8">
            
            <!-- Toast Notification -->
            <div id="audio-status-toast" class="absolute -top-10 bg-black/60 text-white text-xs px-4 py-2 rounded-full backdrop-blur-md transition-opacity duration-300 opacity-0 pointer-events-none z-50">
                <i class="fas fa-info-circle text-pink-400 mr-1"></i> <span id="toast-text">Mencari Instrumental...</span>
            </div>

            <!-- Audio Cover Art (Gambar Muter) -->
            <div id="p-audio-wrapper" class="flex w-full items-center justify-center py-6 mb-4 relative">
                <!-- Spinner Loading di atas Piringan saat mencari lagu -->
                <div id="p-audio-loading" class="absolute inset-0 z-20 flex flex-col items-center justify-center bg-black/50 rounded-full w-56 h-56 md:w-72 md:h-72 mx-auto backdrop-blur-sm hidden">
                    <i class="fas fa-circle-notch fa-spin text-4xl text-pink-500 mb-2"></i>
                    <p class="text-[10px] text-white font-bold tracking-widest uppercase mt-2">MEMUAT AUDIO...</p>
                </div>

                <div id="p-artwork-container" class="w-56 h-56 md:w-72 md:h-72 rounded-full overflow-hidden border-4 border-white/20 shadow-[0_0_60px_rgba(236,72,153,0.3)] relative transition-all duration-300">
                    <img id="p-artwork" src="" class="w-full h-full object-cover">
                    <!-- Tengah Piringan Hitam -->
                    <div class="absolute inset-0 m-auto w-12 h-12 bg-[#0f172a] rounded-full border-[3px] border-slate-700 shadow-inner"></div>
                </div>
            </div>

            <!-- Mic Sync Control -->
            <div class="w-full flex justify-center mb-8">
                <button id="p-mic-btn" onclick="toggleMic()" class="bg-white/10 hover:bg-white/20 border border-white/20 text-white px-8 py-3 rounded-full font-bold transition-all flex items-center gap-3 shadow-lg backdrop-blur-md group">
                    <div class="w-8 h-8 rounded-full bg-slate-700 flex items-center justify-center group-hover:bg-pink-500 transition-colors" id="p-mic-icon-bg">
                        <i class="fas fa-microphone-slash text-sm" id="p-mic-icon"></i>
                    </div>
                    <span id="p-mic-text">Mic Sync Aktifkan!</span>
                </button>
            </div>
            
            <!-- Audio Progress Bar -->
            <div id="p-audio-controls" class="flex flex-col w-full max-w-2xl mt-2 mb-8 relative">
                <!-- iTunes Audio Element (Sebagai Cadangan jika Instrumental Gagal) -->
                <audio id="p-audio-element" class="hidden"><source src="" type="audio/mpeg"></audio>
                
                <div class="flex items-center gap-4">
                    <span id="p-time-current" class="text-sm font-medium text-gray-300 w-10 text-right">0:00</span>
                    <div class="flex-1 h-3 bg-white/10 rounded-full cursor-pointer relative shadow-inner overflow-hidden" onclick="seekAudio(event)" id="p-progress-bg">
                        <div id="p-progress-fill" class="absolute top-0 left-0 h-full bg-gradient-to-r from-pink-500 to-purple-500 rounded-full w-0 transition-all duration-75 shadow-[0_0_15px_rgba(236,72,153,0.8)]"></div>
                    </div>
                    <span id="p-time-duration" class="text-sm font-medium text-gray-300 w-10">0:00</span>
                    <button onclick="togglePlayPause()" class="w-14 h-14 ml-2 bg-gradient-to-br from-pink-500 to-purple-600 text-white rounded-full flex items-center justify-center hover:scale-110 transition-transform shadow-[0_0_20px_rgba(236,72,153,0.5)] shrink-0">
                        <i id="p-play-icon" class="fas fa-play text-xl ml-1"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- Super Large Lyrics Area -->
        <div class="relative z-10 flex-1 overflow-y-auto px-6 md:px-20 pb-32 lyrics-box" id="p-lyrics-container">
            <div id="p-lyrics-loading" class="flex flex-col items-center justify-center h-full text-pink-400 pt-10">
                <i class="fas fa-spinner fa-spin text-5xl mb-4"></i>
                <p class="text-lg font-medium">Menyiapkan Lirik...</p>
            </div>
            <div id="p-lyrics-text" class="text-2xl md:text-5xl leading-[1.8] md:leading-loose font-bold text-center text-white/40 pb-64 pt-4 max-w-4xl mx-auto">
                <!-- Teks Lirik -->
            </div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ==========================================
        // KONFIGURASI API
        // ==========================================
        const apiKey = "AIzaSyAqkCqh7wOfdkBYpNTrkZZOJfeRMnBfwDI"; 
        const SPOTIFY_CLIENT_ID = ""; 
        const REDIRECT_URI = window.location.href.split('#')[0].split('?')[0]; 

        let firebaseConfig;
        try {
            if (typeof __firebase_config !== 'undefined') firebaseConfig = JSON.parse(__firebase_config);
            else throw new Error("Local environment");
        } catch(e) {
            firebaseConfig = {
                apiKey: "AIzaSyD_oQ4qkT4iVAxw0oQ6eQYtAttj_ggxY_0",
                authDomain: "karaokemen-b06e3.firebaseapp.com",
                projectId: "karaokemen-b06e3",
                storageBucket: "karaokemen-b06e3.firebasestorage.app",
                messagingSenderId: "510247443264",
                appId: "1:510247443264:web:05482ef35489404696f8a5",
                measurementId: "G-387KYY9MY1"
            };
        }
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'ozza-karaoke-app';
        
        let currentUser = null;
        let favoriteSongs = [];

        // ==========================================
        // STATE & EXPORTS
        // ==========================================
        let isMicActive = false;
        let recognition = null;
        let audioContext = null;
        let mediaStream = null;
        let currentLyricsArray = [];
        let searchTimeout = null;
        let spotifyAccessToken = null;
        let currentPlayingSong = null;

        // Player Engine States
        let ytPlayer = null;
        let activeEngine = 'itunes'; // 'youtube' or 'itunes'
        let progressInterval = null;
        let ytFallbackTimeout = null;

        window.loginSpotify = loginSpotify;
        window.openKaraoke = openKaraoke;
        window.closeKaraoke = closeKaraoke;
        window.togglePlayPause = togglePlayPause;
        window.seekAudio = seekAudio;
        window.toggleMic = toggleMic;
        window.manualSync = manualSync;
        window.toggleFavoriteCurrentSong = toggleFavoriteCurrentSong;
        window.removeFavorite = removeFavorite;
        window.clearSearch = clearSearch;

        // Init YouTube API global callback
        window.onYouTubeIframeAPIReady = function() {
            console.log("YouTube API Ready");
        };

        // ==========================================
        // INITIALIZATION
        // ==========================================
        window.onload = () => {
            initFirebaseAuth();
            handleSpotifyAuth();
        };

        async function initFirebaseAuth() {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token);
                else await signInAnonymously(auth);
            } catch(e) { console.error(e); }
        }

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) loadFavoritesFromFirebase();
        });

        // ==========================================
        // GENERATE LIST ITEM
        // ==========================================
        function generateListItemHTML(songId, title, artist, imgUrl, onclickFn, isFavList = false) {
            return `
                <div class="glass-panel w-full flex items-center justify-between p-4 rounded-2xl hover:bg-slate-800/80 transition-all cursor-pointer group shadow-md" onclick="${onclickFn}">
                    <div class="flex items-center gap-4 min-w-0 flex-1">
                        <img src="${imgUrl}" class="w-16 h-16 rounded-xl object-cover shadow-lg shrink-0 border border-white/5">
                        <div class="flex flex-col text-left min-w-0 pr-4">
                            <h3 class="text-white font-bold text-lg truncate">${title}</h3>
                            <p class="text-pink-400 text-sm font-medium truncate">${artist}</p>
                        </div>
                    </div>
                    ${isFavList ? 
                    `<button class="text-slate-400 hover:text-pink-500 p-3 transition-transform hover:scale-125 shrink-0" onclick="event.stopPropagation(); removeFavorite('${songId}')" title="Hapus Favorit"><i class="fas fa-heart text-2xl"></i></button>` 
                    : 
                    `<button class="bg-gradient-to-r from-pink-500 to-purple-600 hover:from-pink-400 hover:to-purple-500 text-white px-6 py-2.5 rounded-full font-bold shadow-lg shadow-pink-500/30 transition-transform group-hover:scale-105 shrink-0 whitespace-nowrap ml-2">Nyanyi <i class="fas fa-microphone-alt ml-1 hidden sm:inline"></i></button>`}
                </div>
            `;
        }

        // ==========================================
        // FUNGSI FIREBASE FAVORIT
        // ==========================================
        function loadFavoritesFromFirebase() {
            if (!currentUser) return;
            const favRef = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'favorites');
            onSnapshot(favRef, (snapshot) => {
                favoriteSongs = [];
                snapshot.forEach(doc => { favoriteSongs.push({ id: doc.id, ...doc.data() }); });
                renderFavorites();
                updateFavoriteButtonUI();
            });
        }

        function renderFavorites() {
            const favList = document.getElementById('favorites-list');
            const emptyFav = document.getElementById('empty-favorites');
            favList.innerHTML = '';
            
            if (favoriteSongs.length === 0) { emptyFav.classList.remove('hidden'); return; }
            emptyFav.classList.add('hidden');
            
            favoriteSongs.forEach(song => {
                const safeTitle = song.title.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                const safeArtist = song.artist.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                const onclickStr = `openKaraoke('${safeTitle}', '${safeArtist}', '${song.previewUrl}', '${song.artworkUrl}')`;
                favList.innerHTML += generateListItemHTML(song.id, song.title, song.artist, song.artworkUrl, onclickStr, true);
            });
        }

        async function toggleFavoriteCurrentSong() {
            if (!currentUser || !currentPlayingSong) return;
            const songId = `${currentPlayingSong.title}-${currentPlayingSong.artist}`.replace(/[^a-zA-Z0-9]/g, '');
            const docRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'favorites', songId);
            const isFav = favoriteSongs.some(f => f.id === songId);
            
            const favIcon = document.getElementById('p-fav-icon');
            favIcon.classList.add('scale-150');
            setTimeout(() => favIcon.classList.remove('scale-150'), 200);

            try {
                if (isFav) await deleteDoc(docRef);
                else await setDoc(docRef, { id: songId, ...currentPlayingSong });
            } catch (error) {}
        }

        async function removeFavorite(songId) {
            if (!currentUser) return;
            try { await deleteDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'favorites', songId)); } catch (error) {}
        }

        function updateFavoriteButtonUI() {
            if (!currentPlayingSong) return;
            const songId = `${currentPlayingSong.title}-${currentPlayingSong.artist}`.replace(/[^a-zA-Z0-9]/g, '');
            const isFav = favoriteSongs.some(f => f.id === songId);
            const favIcon = document.getElementById('p-fav-icon');
            if (isFav) {
                favIcon.classList.replace('far', 'fas');
                favIcon.classList.add('text-pink-500');
            } else {
                favIcon.classList.replace('fas', 'far');
                favIcon.classList.remove('text-pink-500');
            }
        }

        // ==========================================
        // FUNGSI PENCARIAN ITUNES
        // ==========================================
        const searchInput = document.getElementById('search-input');
        if (searchInput) {
            searchInput.addEventListener('input', function (e) {
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(() => {
                    if (searchInput.value.trim() !== '') searchSongs();
                    else clearSearch();
                }, 800);
            });
            searchInput.addEventListener('keypress', function (e) {
                if (e.key === 'Enter') { clearTimeout(searchTimeout); if (searchInput.value.trim() !== '') searchSongs(); }
            });
        }
        document.getElementById('search-btn')?.addEventListener('click', () => {
            clearTimeout(searchTimeout); if (searchInput.value.trim() !== '') searchSongs();
        });

        function clearSearch() {
            searchInput.value = '';
            document.getElementById('search-results-section').classList.add('hidden');
            document.getElementById('search-results-section').classList.remove('flex');
            
            if(spotifyAccessToken) {
                document.getElementById('spotify-section').classList.remove('hidden');
                document.getElementById('spotify-section').classList.add('flex');
            }
            document.getElementById('favorites-section').classList.remove('hidden');
            document.getElementById('favorites-section').classList.add('flex');
        }

        async function searchSongs() {
            const query = searchInput.value.trim();
            if (!query) return;

            const resList = document.getElementById('search-results-list');
            const resSection = document.getElementById('search-results-section');
            const loading = document.getElementById('main-loading');
            
            document.getElementById('spotify-section').classList.add('hidden');
            document.getElementById('favorites-section').classList.add('hidden');
            document.getElementById('favorites-section').classList.remove('flex');

            resList.innerHTML = '';
            resSection.classList.remove('hidden'); resSection.classList.add('flex');
            loading.classList.remove('hidden'); loading.classList.add('flex');

            try {
                const response = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&country=id&media=music&entity=song&limit=15`);
                const data = await response.json();
                loading.classList.add('hidden'); loading.classList.remove('flex');

                if (!data.results || data.results.length === 0) {
                    resList.innerHTML = `<div class="glass-panel p-8 text-center text-gray-400 rounded-2xl w-full"><i class="fas fa-search-minus text-4xl mb-3 block"></i>Lagu "${query}" tidak ditemukan.</div>`;
                    return;
                }

                data.results.forEach(song => {
                    const highResImage = song.artworkUrl100.replace('100x100bb', '600x600bb');
                    const safeTitle = song.trackName.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                    const safeArtist = song.artistName.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                    const onclickStr = `openKaraoke('${safeTitle}', '${safeArtist}', '${song.previewUrl}', '${highResImage}')`;
                    
                    resList.innerHTML += generateListItemHTML("", song.trackName, song.artistName, highResImage, onclickStr, false);
                });
            } catch (error) {
                loading.classList.add('hidden'); loading.classList.remove('flex');
                resList.innerHTML = `<div class="glass-panel p-8 text-center text-red-400 rounded-2xl w-full"><i class="fas fa-wifi text-4xl mb-3 block"></i>Gagal memuat pencarian. Coba lagi.</div>`;
            }
        }

        // ==========================================
        // SPOTIFY
        // ==========================================
        function handleSpotifyAuth() {
            const hash = window.location.hash;
            if (hash && hash.includes('access_token')) {
                spotifyAccessToken = new URLSearchParams(hash.substring(1)).get('access_token');
                window.history.pushState("", document.title, window.location.pathname + window.location.search);
                showSpotifyConnected();
            } else if (localStorage.getItem('spotify_fake_token')) {
                spotifyAccessToken = localStorage.getItem('spotify_fake_token'); showSpotifyConnected();
            } else { document.getElementById('spotify-login-btn').classList.remove('hidden'); }
        }

        function loginSpotify() {
            if (!SPOTIFY_CLIENT_ID) {
                localStorage.setItem('spotify_fake_token', 'demo_mode_active'); handleSpotifyAuth(); return;
            }

            try {

                const data = await response.json();

                    audioUrl = data.results[0].previewUrl; 
                    finalCover = data.results[0].artworkUrl100.replace('100x100bb', '600x600bb');

        // ==========================================
        // SMART AUDIO ENGINE (YT HIDDEN -> ITUNES)
        // ==========================================
        
        function showToast(message) {
            const toast = document.getElementById('audio-status-toast');
            document.getElementById('toast-text').textContent = message;
            toast.classList.remove('opacity-0');
            setTimeout(() => toast.classList.add('opacity-0'), 4000);

        async function findInstrumentalVideoId(title, artist) {
            if (!apiKey) return null;
            try {
                const prompt = `Cari 1 ID Video YouTube (11 karakter) untuk lagu instrumental karaoke ini: "${title} ${artist} karaoke instrumental". WAJIB: Kembalikan HANYA 11 karakter ID videonya saja. Tanpa teks tambahan, tanpa kutip, tanpa link. Contoh: dQw4w9WgXcQ`;
                
                // Set AI Model based on environment
                const isLocalPreview = typeof __firebase_config !== 'undefined';
                const modelName = isLocalPreview ? 'gemini-2.5-flash-preview-09-2025' : 'gemini-1.5-flash';
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`;
                
                // BYPASS SAFETY SETTINGS: Pastikan AI mau memberikan jawaban meski lagu dianggap eksplisit
                const safetySettings = [
                    { category: "HARM_CATEGORY_HARASSMENT", threshold: "BLOCK_NONE" },
                    { category: "HARM_CATEGORY_HATE_SPEECH", threshold: "BLOCK_NONE" },
                    { category: "HARM_CATEGORY_SEXUALLY_EXPLICIT", threshold: "BLOCK_NONE" },
                    { category: "HARM_CATEGORY_DANGEROUS_CONTENT", threshold: "BLOCK_NONE" }
                ];

                const response = await fetch(url, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        contents: [{ parts: [{ text: prompt }] }],
                        safetySettings: safetySettings 
                    })
                });

                const data = await response.json();
                const text = data.candidates?.[0]?.content?.parts?.[0]?.text?.trim() || "";
                const match = text.match(/[a-zA-Z0-9_-]{11}/);
                if (match) return match[0];
            } catch(e) {}
            return null;
        }

        async function initHiddenYtEngine(videoId) {
            return new Promise((resolve) => {
                if (ytPlayer) {
                    ytPlayer.loadVideoById(videoId);
                    resolve(true);
                } else {
                    ytPlayer = new YT.Player('hidden-yt-player', {
                        height: '10', 
                        width: '10',
                        videoId: videoId,
                        playerVars: { 'autoplay': 1, 'controls': 0, 'disablekb': 1, 'playsinline': 1 },
                        events: {
                            'onReady': (event) => {
                                event.target.playVideo(); 
                                resolve(true);
                            },
                            'onError': (event) => {
                                console.warn("Video YT Error atau diblokir:", event.data);
                                resolve(false); 
                            },
                            'onStateChange': onYtStateChange
                        }
                    });
                }
            });
        }

        function onYtStateChange(event) {
            const artworkSpin = document.getElementById('p-artwork-container');
            const playIcon = document.getElementById('p-play-icon');
            
            if (event.data == YT.PlayerState.PLAYING) {
                if (typeof ytFallbackTimeout !== 'undefined') clearTimeout(ytFallbackTimeout);
                
                activeEngine = 'youtube';
                document.getElementById('p-audio-loading').classList.add('hidden');
                showToast("Memutar Full Instrumental 🎵");
                
                artworkSpin.classList.add('spin');
                playIcon.classList.replace('fa-play', 'fa-pause');
                
                document.getElementById('p-time-duration').textContent = formatTime(ytPlayer.getDuration());
                if (!progressInterval) progressInterval = setInterval(updateYtProgress, 500);

            } else if (event.data == YT.PlayerState.PAUSED || event.data == YT.PlayerState.ENDED) {
                artworkSpin.classList.remove('spin');
                playIcon.classList.replace('fa-pause', 'fa-play');
                clearInterval(progressInterval);
                progressInterval = null;
            }
        }

        function updateYtProgress() {
            if(!ytPlayer || activeEngine !== 'youtube') return;
            const current = ytPlayer.getCurrentTime();
            const duration = ytPlayer.getDuration();
            document.getElementById('p-time-current').textContent = formatTime(current);
            document.getElementById('p-progress-fill').style.width = `${(current / duration) * 100}%`;
        }

        function formatTime(seconds) {
            if (!seconds || isNaN(seconds)) return "0:00";
            return `${Math.floor(seconds / 60)}:${Math.floor(seconds % 60).toString().padStart(2, '0')}`;
        }

        // ==========================================
        // IMMERSIVE FULLSCREEN PLAYER
        // ==========================================
        async function openKaraoke(title, artist, previewUrl, artworkUrl) {
            const playerScreen = document.getElementById('player-screen');
            const audioEl = document.getElementById('p-audio-element');
            const audioLoading = document.getElementById('p-audio-loading');
            
            document.body.style.overflow = 'hidden';

            playerScreen.classList.remove('translate-y-full');
            playerScreen.classList.add('translate-y-0');

            if (isMicActive) toggleMic();

            currentPlayingSong = { title, artist, previewUrl, artworkUrl };
            updateFavoriteButtonUI();

            document.getElementById('p-title').textContent = title;
            document.getElementById('p-artist').textContent = artist;
            document.getElementById('p-artwork').src = artworkUrl;
            document.getElementById('p-bg-blur').style.backgroundImage = `url('${artworkUrl}')`;
            
            // Reset States
            audioEl.pause();
            if(ytPlayer && typeof ytPlayer.stopVideo === 'function') ytPlayer.stopVideo();
            clearInterval(progressInterval);
            if (ytFallbackTimeout) clearTimeout(ytFallbackTimeout);
            
            document.getElementById('p-lyrics-text').innerHTML = '';
            document.getElementById('p-time-current').textContent = '0:00';
            document.getElementById('p-time-duration').textContent = '0:00';
            document.getElementById('p-progress-fill').style.width = '0%';
            document.getElementById('p-artwork-container').classList.remove('spin');
            document.getElementById('p-play-icon').classList.replace('fa-pause', 'fa-play');

            // 1. Mulai fetch lirik (Dengan Safety Filter Bypass + Database Baru LRCLIB)
            fetchLyricsWithAI(artist, title);

            // 2. Mulai siapkan Engine Instrumental (Hidden YouTube)
            activeEngine = 'none';
            audioLoading.classList.remove('hidden');
            showToast("Mencari Instrumen Full...");

            const ytVideoId = await findInstrumentalVideoId(title, artist);
            
            if (ytVideoId) {
                const isYtSuccess = await initHiddenYtEngine(ytVideoId);
                
                if (!isYtSuccess) {
                    fallbackToItunes(previewUrl);
                    return;
                }
                
                // Beri waktu lebih lama (10 DETIK) agar YouTube tidak terputus terlalu awal
                ytFallbackTimeout = setTimeout(() => {
                    if(activeEngine !== 'youtube') {
                        console.log("YouTube Timeout, jatuh ke iTunes...");
                        fallbackToItunes(previewUrl);
                    }
                }, 10000);

            } else {
                fallbackToItunes(previewUrl);
            }
        }

        function fallbackToItunes(previewUrl) {
            if(activeEngine === 'youtube') return; 
            showToast("Memutar Lagu Asli (Vokal)");
            activeEngine = 'itunes';
            const audioEl = document.getElementById('p-audio-element');
            document.getElementById('p-audio-loading').classList.add('hidden');
            
            audioEl.src = previewUrl;
            audioEl.load();
            audioEl.play().catch(e => console.log("Autoplay blocked"));
        }

        function closeKaraoke() {
            const playerScreen = document.getElementById('player-screen');
            const audioEl = document.getElementById('p-audio-element');

            audioEl.pause();
            audioEl.src = "";
            if(ytPlayer && typeof ytPlayer.stopVideo === 'function') ytPlayer.stopVideo();
            clearInterval(progressInterval);
            if (ytFallbackTimeout) clearTimeout(ytFallbackTimeout);
            
            document.getElementById('p-artwork-container').classList.remove('spin');
            if (isMicActive) toggleMic(); 

            playerScreen.classList.remove('translate-y-0');
            playerScreen.classList.add('translate-y-full');
            setTimeout(() => { document.body.style.overflow = ''; }, 500);
        }

        // ==========================================
        // KONTROL AUDIO (Universal)
        // ==========================================
        const audioEl = document.getElementById('p-audio-element');
        const playIcon = document.getElementById('p-play-icon');
        const artworkSpin = document.getElementById('p-artwork-container');

        audioEl.addEventListener('play', () => { if(activeEngine === 'itunes') { artworkSpin.classList.add('spin'); playIcon.classList.replace('fa-play', 'fa-pause'); }});
        audioEl.addEventListener('pause', () => { if(activeEngine === 'itunes') { artworkSpin.classList.remove('spin'); playIcon.classList.replace('fa-pause', 'fa-play'); }});
        audioEl.addEventListener('ended', () => { if(activeEngine === 'itunes') { artworkSpin.classList.remove('spin'); playIcon.classList.replace('fa-pause', 'fa-play'); }});
        
        audioEl.addEventListener('timeupdate', () => {
            if(activeEngine !== 'itunes') return;
            const current = audioEl.currentTime; const duration = audioEl.duration || 30;
            document.getElementById('p-time-current').textContent = formatTime(current);
            document.getElementById('p-progress-fill').style.width = `${(current / duration) * 100}%`;
        });
        
        audioEl.addEventListener('loadedmetadata', () => {
            if(activeEngine === 'itunes' && audioEl.duration && !isNaN(audioEl.duration) && audioEl.duration !== Infinity) {
                document.getElementById('p-time-duration').textContent = formatTime(audioEl.duration);
            }
        });

        function togglePlayPause() { 
            if (activeEngine === 'youtube' && ytPlayer) {
                const state = ytPlayer.getPlayerState();
                if(state == YT.PlayerState.PLAYING) ytPlayer.pauseVideo();
                else ytPlayer.playVideo();
            } else {
                if (audioEl.paused) audioEl.play(); else audioEl.pause(); 
            }
        }

        function seekAudio(e) {
            const rect = document.getElementById('p-progress-bg').getBoundingClientRect();
            const ratio = (e.clientX - rect.left) / rect.width;
            
            if (activeEngine === 'youtube' && ytPlayer) {
                const duration = ytPlayer.getDuration();
                ytPlayer.seekTo(ratio * duration, true);
            } else {
                const duration = audioEl.duration || 30;
                audioEl.currentTime = ratio * duration;
            }
        }

        // ==========================================
        // FUNGSI LIRIK AI & MIC SYNC (DIPERBAIKI)
        // ==========================================
        function displayLyrics(lyricsText) {
            let cleanLyrics = lyricsText.replace(/Paroles de la chanson.*\n/ig, '');
            currentLyricsArray = cleanLyrics.split('\n').filter(line => line.trim() !== '');
            let formattedLyrics = '';
            currentLyricsArray.forEach((line, index) => {
                formattedLyrics += `<div id="lyric-${index}" class="lyric-line py-4 md:py-6 cursor-pointer hover:text-white transition-colors" onclick="manualSync(${index})">${line}</div>`;
            });
            document.getElementById('p-lyrics-text').innerHTML = formattedLyrics;
            document.getElementById('p-lyrics-loading').classList.add('hidden'); 
            document.getElementById('p-lyrics-loading').classList.remove('flex');
            
            setTimeout(() => manualSync(0), 500);
        }

        async function fetchLyricsWithAI(artist, title) {
            const loading = document.getElementById('p-lyrics-loading');
            loading.classList.remove('hidden'); loading.classList.add('flex');
            loading.querySelector('p').textContent = "Mencari lirik lagu...";

            // 1. MENGGUNAKAN DATABASE SUPER BESAR & STABIL (LRCLIB)
            try {
                const res = await fetch(`https://lrclib.net/api/search?q=${encodeURIComponent(artist + ' ' + title)}`);
                if (res.ok) {
                    const data = await res.json();
                    if (data && data.length > 0 && data[0].plainLyrics) { 
                        displayLyrics(data[0].plainLyrics); 
                        return; // Jika ketemu, selesai!
                    }
                }
            } catch (e) {
                console.log("LRCLIB gagal, lanjut memanggil AI Gemini...");
            }

            // 2. FALLBACK KE AI GEMINI DENGAN SENSOR DIMATIKAN
            const isLocalPreview = typeof __firebase_config !== 'undefined';
            const modelName = isLocalPreview ? 'gemini-2.5-flash-preview-09-2025' : 'gemini-1.5-flash';
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`;
            const prompt = `Tuliskan lirik lagu lengkap "${title}" oleh "${artist}". WAJIB: Hanya berikan teks liriknya saja dari awal sampai akhir. Jangan tambahkan intro, judul, penjelasan, atau teks apapun selain lirik.`;

            loading.querySelector('p').textContent = "AI sedang menyusun lirik...";

            // BYPASS SENSOR: Mengizinkan lirik sedih/kasar/eksplisit agar tidak diblokir oleh AI
            const safetySettings = [
                { category: "HARM_CATEGORY_HARASSMENT", threshold: "BLOCK_NONE" },
                { category: "HARM_CATEGORY_HATE_SPEECH", threshold: "BLOCK_NONE" },
                { category: "HARM_CATEGORY_SEXUALLY_EXPLICIT", threshold: "BLOCK_NONE" },
                { category: "HARM_CATEGORY_DANGEROUS_CONTENT", threshold: "BLOCK_NONE" }
            ];

            for (let i = 0; i < 3; i++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            contents: [{ parts: [{ text: prompt }] }],
                            safetySettings: safetySettings 
                        })
                    });
                    
                    if (!response.ok) throw new Error("API Error");
                    const data = await response.json();
                    
                    // Cek jika tetap terblokir
                    if (data.candidates && data.candidates[0].finishReason === "SAFETY") {
                        throw new Error("Lirik diblokir sistem.");
                    }

                    let lyricsText = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    
                    if (lyricsText && lyricsText.length > 20) {
                        displayLyrics(lyricsText);
                    } else {
                        document.getElementById('p-lyrics-text').innerHTML = '<p class="text-white mt-20">Lirik tidak ditemukan di database manapun.</p>';
                        loading.classList.add('hidden'); loading.classList.remove('flex');
                    }
                    return; 
                } catch (error) {
                    if (i === 2) {
                        document.getElementById('p-lyrics-text').innerHTML = `<p class="text-white mt-16 px-6 text-sm">Gagal memuat lirik AI. Silakan coba lagi.</p>`;
                        loading.classList.add('hidden'); loading.classList.remove('flex');
                    } else await new Promise(res => setTimeout(res, 1000 * Math.pow(2, i)));
                }
            }
        }

        function manualSync(index) {
            document.querySelectorAll('.lyric-line').forEach(el => {
                el.classList.remove('lyric-active');
            });
            const activeLine = document.getElementById(`lyric-${index}`);
            if (activeLine) {
                activeLine.classList.add('lyric-active');
                activeLine.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        async function toggleMic() {
            const micBtn = document.getElementById('p-mic-btn');
            const micIconBg = document.getElementById('p-mic-icon-bg');
            const micIcon = document.getElementById('p-mic-icon');
            const micText = document.getElementById('p-mic-text');
            
            if (isMicActive) {
                isMicActive = false;
                micIconBg.classList.replace('bg-pink-500', 'bg-slate-700');
                micIcon.classList.replace('fa-microphone', 'fa-microphone-slash');
                micText.textContent = "Mic Sync Aktifkan!";
                
                document.getElementById('p-artwork-container').style.boxShadow = '0 0 60px rgba(236,72,153,0.3)'; 

                if (recognition) recognition.stop();
                if (mediaStream) mediaStream.getTracks().forEach(track => track.stop());
                if (audioContext) audioContext.close();
                return;
            }

            try {
                mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                isMicActive = true;
                micIconBg.classList.replace('bg-slate-700', 'bg-pink-500');
                micIcon.classList.replace('fa-microphone-slash', 'fa-microphone');
                micText.textContent = "Mic Sync Menyala";
                setupVisualizer(mediaStream);
                setupSpeechRecognition();
            } catch (err) { alert("Gagal mengakses Mikrofon. Beri izin di browsermu!"); }
        }

        function setupVisualizer(stream) {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const analyser = audioContext.createAnalyser();
            const microphone = audioContext.createMediaStreamSource(stream);
            const javascriptNode = audioContext.createScriptProcessor(2048, 1, 1);

            analyser.smoothingTimeConstant = 0.8; analyser.fftSize = 1024;
            microphone.connect(analyser); analyser.connect(javascriptNode); javascriptNode.connect(audioContext.destination);

            javascriptNode.onaudioprocess = function() {
                if (!isMicActive) return;
                const array = new Uint8Array(analyser.frequencyBinCount);
                analyser.getByteFrequencyData(array);
                
                let values = 0;
                for (let i = 0; i < array.length; i++) { values += (array[i]); }
                const average = values / array.length;
                
                const blurBg = document.getElementById('p-bg-blur');
                const artworkContainer = document.getElementById('p-artwork-container');
                
                blurBg.style.opacity = 0.4 + (average / 300);
                blurBg.style.filter = `blur(${60 - (average/10)}px)`;
                artworkContainer.style.boxShadow = `0 0 ${40 + (average * 2)}px rgba(236, 72, 153, ${0.3 + (average/200)})`;
            };
        }
        
        function setupSpeechRecognition() {
            if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) return;
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;

            recognition.onresult = (event) => {
                if (!isMicActive) return;
                let transcript = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    transcript += event.results[i][0].transcript;
                }
                syncLyricByText(transcript);
            };
            recognition.onend = () => { if (isMicActive) try { recognition.start(); } catch(e){} };
            recognition.start();
        }

        function syncLyricByText(spokenText) {
            if (!spokenText || currentLyricsArray.length === 0) return;
            const spokenWords = spokenText.toLowerCase().split(' ').filter(w => w.length > 2);
            if (spokenWords.length === 0) return;

            let bestIdx = -1;
            let maxScore = 0;

            currentLyricsArray.forEach((line, index) => {
                const lineWords = line.toLowerCase().split(' ');
                let score = 0;
                spokenWords.forEach(sw => { if (lineWords.includes(sw)) score++; });
                if (score > maxScore) { maxScore = score; bestIdx = index; }
            });
            if (bestIdx !== -1 && maxScore > 0) manualSync(bestIdx);
        }
